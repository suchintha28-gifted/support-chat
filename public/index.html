<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gifted Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .chat { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 100%; max-width: 600px; height: 80vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: #1a1a2e; color: white; padding: 16px 20px; font-weight: 600; font-size: 16px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
    .msg.user { background: #1a1a2e; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.agent { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.thinking { color: #999; font-style: italic; background: #f9f9f9; }
    .input-area { display: flex; padding: 16px; border-top: 1px solid #eee; gap: 10px; }
    textarea { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; resize: none; height: 44px; font-family: inherit; }
    button { background: #1a1a2e; color: white; border: none; border-radius: 8px; padding: 0 20px; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">🎁 Gifted Support</div>
    <div class="messages" id="messages">
      <div class="msg agent">Hi! I'm the Gifted support assistant. How can I help you today?</div>
    </div>
    <div class="input-area">
      <textarea id="input" placeholder="Type your message…" onkeydown="handleKey(event)"></textarea>
      <button id="send" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    let sessionId = null;

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      document.getElementById('send').disabled = true;

      const thinking = addMessage('Thinking…', 'thinking');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId })
        });
        const data = await res.json();
        thinking.remove();
        sessionId = data.sessionId;
        addMessage(data.reply || 'Sorry, I didn\'t get a response. Please try again.', 'agent');
      } catch {
        thinking.remove();
        addMessage('Something went wrong. Please try again.', 'agent');
      }

      document.getElementById('send').disabled = false;
      input.focus();
    }

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      const msgs = document.getElementById('messages');
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
