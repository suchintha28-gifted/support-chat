<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gifted Support</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
      padding: 20px;
    }
    
    .chat-container { 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
      width: 100%; 
      max-width: 700px; 
      height: 85vh; 
      max-height: 800px;
      display: flex; 
      flex-direction: column; 
      overflow: hidden;
    }
    
    .header { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
      padding: 24px 28px; 
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .header-icon {
      font-size: 28px;
    }
    
    .header-text {
      flex: 1;
    }
    
    .header-title {
      font-weight: 700; 
      font-size: 20px;
      margin-bottom: 4px;
    }
    
    .header-subtitle {
      font-size: 13px;
      opacity: 0.9;
      font-weight: 400;
    }
    
    .messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 24px; 
      display: flex; 
      flex-direction: column; 
      gap: 16px;
      background: #f8f9fa;
    }
    
    .message-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    
    .message-wrapper.user {
      flex-direction: row-reverse;
    }
    
    .msg { 
      max-width: 75%; 
      padding: 12px 16px; 
      border-radius: 16px; 
      line-height: 1.5; 
      font-size: 15px; 
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .msg.user { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
      border-bottom-right-radius: 4px;
    }
    
    .msg.agent { 
      background: white;
      color: #333; 
      border-bottom-left-radius: 4px;
      border: 1px solid #e9ecef;
    }
    
    .msg.thinking { 
      background: #e9ecef;
      color: #6c757d; 
      font-style: italic;
      border-bottom-left-radius: 4px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    
    .timestamp {
      font-size: 11px;
      color: #6c757d;
      margin-top: 4px;
    }
    
    .input-area { 
      display: flex; 
      padding: 20px 24px; 
      border-top: 1px solid #dee2e6; 
      gap: 12px;
      background: white;
    }
    
    textarea { 
      flex: 1; 
      border: 2px solid #dee2e6; 
      border-radius: 12px; 
      padding: 12px 16px; 
      font-size: 15px; 
      resize: none; 
      min-height: 48px;
      max-height: 120px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    
    textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
      border: none; 
      border-radius: 12px; 
      padding: 0 28px; 
      cursor: pointer; 
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }
    
    button:active:not(:disabled) {
      transform: translateY(0);
    }
    
    button:disabled { 
      opacity: 0.5; 
      cursor: not-allowed;
      transform: none;
    }
    
    /* Scrollbar styling */
    .messages::-webkit-scrollbar {
      width: 8px;
    }
    
    .messages::-webkit-scrollbar-track {
      background: #f1f3f5;
    }
    
    .messages::-webkit-scrollbar-thumb {
      background: #cbd5e0;
      border-radius: 4px;
    }
    
    .messages::-webkit-scrollbar-thumb:hover {
      background: #a0aec0;
    }
    
    /* Mobile responsive */
    @media (max-width: 768px) {
      body {
        padding: 0;
      }
      
      .chat-container {
        border-radius: 0;
        height: 100vh;
        max-height: none;
      }
      
      .msg {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">
      <div class="header-icon">🎁</div>
      <div class="header-text">
        <div class="header-title">Gifted Support</div>
        <div class="header-subtitle">We're here to help with your gift cards</div>
      </div>
    </div>
    
    <div class="messages" id="messages">
    </div>
    
    <div class="input-area">
      <textarea 
        id="input" 
        placeholder="Type your message…" 
        onkeydown="handleKey(event)"
        rows="1"
      ></textarea>
      <button id="send" onclick="sendMessage()">Send</button>
    </div>
  </div>
  
  <script>
    let sessionId = null;
    let eventCount = 0;

    // Language detection and initial greeting
    const greetings = {
      'en': 'Hi! I\'m Binuri, and I\'m here to help you with any questions about Gifted gift cards. What can I help you with today?',
      'sv': 'Hej! Jag heter Binuri och jag är här för att hjälpa dig med frågor om Gifted-presentkort. Vad kan jag hjälpa dig med idag?',
      'da': 'Hej! Jeg hedder Binuri, og jeg er her for at hjælpe dig med spørgsmål om Gifted-gavekort. Hvad kan jeg hjælpe dig med i dag?',
      'no': 'Hei! Jeg heter Binuri, og jeg er her for å hjelpe deg med spørsmål om Gifted-gavekort. Hva kan jeg hjelpe deg med i dag?',
      'nb': 'Hei! Jeg heter Binuri, og jeg er her for å hjelpe deg med spørsmål om Gifted-gavekort. Hva kan jeg hjelpe deg med i dag?',
      'nn': 'Hei! Eg heiter Binuri, og eg er her for å hjelpe deg med spørsmål om Gifted-gavekort. Kva kan eg hjelpe deg med i dag?',
      'de': 'Hallo! Ich bin Binuri und ich bin hier, um Ihnen bei Fragen zu Gifted-Geschenkkarten zu helfen. Womit kann ich Ihnen heute helfen?',
      'nl': 'Hallo! Ik ben Binuri en ik ben hier om u te helpen met vragen over Gifted-cadeaukaarten. Waarmee kan ik u vandaag helpen?'
    };

    function getInitialGreeting() {
      // Get browser language
      const browserLang = navigator.language || navigator.userLanguage;
      // Extract the primary language code (e.g., 'en' from 'en-US')
      const langCode = browserLang.split('-')[0].toLowerCase();
      
      // Return greeting in detected language, or default to English
      return greetings[langCode] || greetings['en'];
    }

    // Set initial greeting based on browser language
    document.addEventListener('DOMContentLoaded', () => {
      const messagesDiv = document.getElementById('messages');
      const initialMessage = messagesDiv.querySelector('.msg.agent');
      if (initialMessage) {
        initialMessage.textContent = getInitialGreeting();
      }
    });

    // Auto-resize textarea
    const textarea = document.getElementById('input');
    textarea.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { 
        e.preventDefault(); 
        sendMessage(); 
      }
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('send').disabled = true;

      const thinking = addMessage('Thinking…', 'thinking');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId, eventCount })
        });
        
        const data = await res.json();
        thinking.remove();
        
        if (res.ok) {
          sessionId = data.sessionId;
          eventCount = data.eventCount || 0;
          addMessage(data.reply || 'Sorry, I didn\'t get a response. Please try again.', 'agent');
        } else {
          addMessage(data.error || 'Something went wrong. Please try again.', 'agent');
        }
      } catch (err) {
        thinking.remove();
        addMessage('Connection error. Please check your internet and try again.', 'agent');
        console.error('Error:', err);
      }

      document.getElementById('send').disabled = false;
      input.focus();
    }

    // Convert markdown bold to HTML
    function parseMarkdown(text) {
      // Convert **bold** to <strong>bold</strong>
      return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }
    
    function addMessage(text, type) {
      const wrapper = document.createElement('div');
      wrapper.className = `message-wrapper ${type}`;
      
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.innerHTML = parseMarkdown(text);
      
      wrapper.appendChild(div);
      
      const msgs = document.getElementById('messages');
      msgs.appendChild(wrapper);
      msgs.scrollTop = msgs.scrollHeight;
      
      return wrapper;
    }

    // Focus input on load
    window.addEventListener('load', () => {
      document.getElementById('input').focus();
    });
  </script>
</body>
</html>
